<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaussian Trend Backtester</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
            border-bottom: 1px solid #30363d;
            padding: 24px 32px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header h1 span { font-size: 28px; }
        .header p { color: #8b949e; margin-top: 4px; font-size: 14px; }

        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 20px 32px;
            background: #161b22;
            border-bottom: 1px solid #21262d;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 14px 20px;
            min-width: 140px;
            flex: 1;
        }
        .stat-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 22px; font-weight: 700; margin-top: 4px; }
        .stat-card .value.green { color: #3fb950; }
        .stat-card .value.red { color: #f85149; }
        .stat-card .value.yellow { color: #d29922; }
        .stat-card .value.blue { color: #58a6ff; }

        .controls {
            display: flex;
            gap: 12px;
            padding: 16px 32px;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls label { font-size: 13px; color: #8b949e; }
        .controls select, .controls input {
            background: #161b22;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
        }
        .controls select:focus, .controls input:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .content { padding: 0 32px 32px; }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-top: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead th {
            background: #161b22;
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        thead th:hover { color: #58a6ff; }
        thead th.sorted { color: #58a6ff; }
        tbody tr {
            border-bottom: 1px solid #21262d;
            transition: background 0.15s;
        }
        tbody tr:hover { background: #161b22; }
        tbody tr.profitable { border-left: 3px solid #3fb950; }
        tbody tr.unprofitable { border-left: 3px solid #f85149; }
        td {
            padding: 10px 14px;
            white-space: nowrap;
        }
        td.symbol {
            font-weight: 600;
            color: #f0f6fc;
            font-size: 14px;
        }
        td.positive { color: #3fb950; font-weight: 500; }
        td.negative { color: #f85149; font-weight: 500; }
        td.neutral { color: #8b949e; }

        .wr-bar {
            display: inline-block;
            height: 6px;
            border-radius: 3px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .chart-section {
            margin-top: 24px;
        }
        .chart-section h2 {
            font-size: 16px;
            color: #c9d1d9;
            margin-bottom: 12px;
        }
        .chart-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            height: 320px;
        }

        .grade-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }
        .grade-A { background: #1a3a2a; color: #3fb950; }
        .grade-B { background: #2a3320; color: #d29922; }
        .grade-C { background: #3a2020; color: #f85149; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8b949e;
        }
        .empty-state h2 { color: #c9d1d9; margin-bottom: 12px; }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #8b949e;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><span>🔮</span> Gaussian Trend Backtester</h1>
        <p>Resultados automáticos · Data de Binance · Capital inicial $10,000</p>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="controls">
        <label>Timeframe:</label>
        <select id="filterTF">
            <option value="ALL">Todos</option>
            <option value="1H">1H</option>
            <option value="4H">4H</option>
            <option value="1D">1D</option>
        </select>

        <label>Min WR%:</label>
        <input type="number" id="filterWR" value="0" min="0" max="100" step="5" style="width:60px">

        <label>Ordenar:</label>
        <select id="sortField">
            <option value="total_pnl">PnL %</option>
            <option value="win_rate">Win Rate</option>
            <option value="profit_factor">Profit Factor</option>
            <option value="max_drawdown">Max DD</option>
            <option value="total_trades">Trades</option>
        </select>
    </div>

    <div class="content">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Símbolo</th>
                        <th>TF</th>
                        <th>Trades</th>
                        <th>Win Rate</th>
                        <th>PnL %</th>
                        <th>Profit Factor</th>
                        <th>Avg Win</th>
                        <th>Avg Loss</th>
                        <th>Max DD</th>
                        <th>TP1</th>
                        <th>TP2</th>
                        <th>TP3</th>
                        <th>Final $</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="chart-section">
            <h2>📈 Equity Curves (Top 5)</h2>
            <div class="chart-container">
                <canvas id="equityChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        let equityChart = null;

        async function loadData() {
            try {
                const resp = await fetch('./results/results.json');
                if (!resp.ok) throw new Error('No results.json found');
                allData = await resp.json();
                renderAll();
            } catch (e) {
                document.getElementById('tableBody').innerHTML = `
                    <tr><td colspan="15" style="text-align:center;padding:40px;color:#8b949e">
                        ⚠ No se encontró results/results.json<br><br>
                        Ejecuta primero: <code style="color:#58a6ff">python3 run_backtest.py</code>
                    </td></tr>`;
            }
        }

        function getFiltered() {
            const tf = document.getElementById('filterTF').value;
            const minWR = parseFloat(document.getElementById('filterWR').value) || 0;
            const sortField = document.getElementById('sortField').value;

            let data = allData.filter(r => {
                if (tf !== 'ALL' && r.timeframe !== tf) return false;
                if (r.win_rate < minWR) return false;
                return true;
            });

            data.sort((a, b) => {
                if (sortField === 'max_drawdown') return a[sortField] - b[sortField];
                return b[sortField] - a[sortField];
            });

            return data;
        }

        function renderAll() {
            const data = getFiltered();
            renderStats(data);
            renderTable(data);
            renderChart(data);
        }

        function renderStats(data) {
            if (!data.length) {
                document.getElementById('statsBar').innerHTML = '';
                return;
            }

            const profitable = data.filter(r => r.total_pnl > 0).length;
            const avgWR = (data.reduce((s, r) => s + r.win_rate, 0) / data.length).toFixed(1);
            const avgPnL = (data.reduce((s, r) => s + r.total_pnl, 0) / data.length).toFixed(1);
            const bestPnL = Math.max(...data.map(r => r.total_pnl));
            const totalTrades = data.reduce((s, r) => s + r.total_trades, 0);

            document.getElementById('statsBar').innerHTML = `
                <div class="stat-card">
                    <div class="label">Tests</div>
                    <div class="value blue">${data.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Rentables</div>
                    <div class="value ${profitable > data.length/2 ? 'green' : 'red'}">${profitable}/${data.length}</div>
                </div>
                <div class="stat-card">
                    <div class="label">Avg Win Rate</div>
                    <div class="value ${avgWR >= 50 ? 'green' : avgWR >= 40 ? 'yellow' : 'red'}">${avgWR}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">Avg PnL</div>
                    <div class="value ${avgPnL > 0 ? 'green' : 'red'}">${avgPnL > 0 ? '+' : ''}${avgPnL}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">Best</div>
                    <div class="value green">+${bestPnL.toFixed(1)}%</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total Trades</div>
                    <div class="value blue">${totalTrades}</div>
                </div>
            `;
        }

        function getGrade(r) {
            if (r.win_rate >= 55 && r.profit_factor >= 1.5 && r.total_pnl > 0) return ['A', 'grade-A'];
            if (r.win_rate >= 45 && r.profit_factor >= 1.0 && r.total_pnl >= -5) return ['B', 'grade-B'];
            return ['C', 'grade-C'];
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="15" style="text-align:center;padding:40px;color:#8b949e">Sin resultados con estos filtros</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((r, i) => {
                const profitable = r.total_pnl > 0;
                const [grade, gradeClass] = getGrade(r);
                const wrWidth = Math.min(60, r.win_rate * 0.6);
                const wrColor = r.win_rate >= 55 ? '#3fb950' : r.win_rate >= 45 ? '#d29922' : '#f85149';

                return `<tr class="${profitable ? 'profitable' : 'unprofitable'}">
                    <td class="neutral">${i + 1}</td>
                    <td class="symbol">${r.symbol}</td>
                    <td>${r.timeframe}</td>
                    <td>${r.total_trades}</td>
                    <td>
                        ${r.win_rate}%
                        <span class="wr-bar" style="width:${wrWidth}px;background:${wrColor}"></span>
                    </td>
                    <td class="${profitable ? 'positive' : 'negative'}">${r.total_pnl > 0 ? '+' : ''}${r.total_pnl}%</td>
                    <td class="${r.profit_factor >= 1.5 ? 'positive' : r.profit_factor >= 1 ? '' : 'negative'}">${r.profit_factor >= 99 ? '∞' : r.profit_factor}</td>
                    <td class="positive">+${r.avg_win}%</td>
                    <td class="negative">${r.avg_loss}%</td>
                    <td class="${r.max_drawdown > 20 ? 'negative' : ''}">${r.max_drawdown}%</td>
                    <td>${r.tp1_hits}</td>
                    <td>${r.tp2_hits}</td>
                    <td>${r.tp3_hits}</td>
                    <td class="${r.final_equity >= 10000 ? 'positive' : 'negative'}">$${r.final_equity.toLocaleString()}</td>
                    <td><span class="grade-badge ${gradeClass}">${grade}</span></td>
                </tr>`;
            }).join('');
        }

        function renderChart(data) {
            const top5 = data.slice(0, 5).filter(r => r.equity && r.equity.length > 0);
            const ctx = document.getElementById('equityChart').getContext('2d');

            if (equityChart) equityChart.destroy();

            const colors = ['#58a6ff', '#3fb950', '#d29922', '#f0883e', '#bc8cff'];

            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: top5.length ? top5[0].equity.map((_, i) => i) : [],
                    datasets: top5.map((r, idx) => ({
                        label: `${r.symbol} ${r.timeframe}`,
                        data: r.equity,
                        borderColor: colors[idx],
                        backgroundColor: 'transparent',
                        borderWidth: 1.5,
                        pointRadius: 0,
                        tension: 0.3
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#8b949e', font: { family: 'Inter', size: 11 } }
                        }
                    },
                    scales: {
                        x: {
                            display: false
                        },
                        y: {
                            ticks: { color: '#8b949e', callback: v => '$' + v.toLocaleString() },
                            grid: { color: '#21262d' }
                        }
                    }
                }
            });
        }

        // Events
        document.getElementById('filterTF').addEventListener('change', renderAll);
        document.getElementById('filterWR').addEventListener('input', renderAll);
        document.getElementById('sortField').addEventListener('change', renderAll);

        // Init
        loadData();
    </script>
</body>
</html>
